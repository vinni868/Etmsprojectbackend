# Project Configuration
spring.application.name=LMS
server.port=8080

# Database Configuration (Local)
spring.datasource.url=jdbc:mysql://localhost:3306/lms_db
spring.datasource.username=root
# It is better to use an environment variable for the password
spring.datasource.password=${DB_PASSWORD:root}

# JPA / Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Use 'update' for the first run to create tables, then switch to 'none'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Twilio Configuration (Securely pulled from Environment Variables)
# To run this, set TWILIO_SID and TWILIO_TOKEN in your OS or STS Run Config
# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=whatsapp:+14155238886

# File Upload Configuration (For your syllabus PDFs)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB








